name: Fetch Feeds

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:         # allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Fetch all overdue feeds
        run: |
          CONCURRENCY=10
          MAX=500
          COUNT=0
          while [ $COUNT -lt $MAX ]; do
            # Fire CONCURRENCY requests in parallel, wait for all to finish
            RESULTS=$(for i in $(seq 1 $CONCURRENCY); do
              curl -s -X POST https://reader.ribbonhouse.nyc/api/admin/fetch-one \
                -H "x-trigger-secret: ${{ secrets.TRIGGER_SECRET }}" &
            done; wait)
            COUNT=$((COUNT + CONCURRENCY))
            # If all returned fetched=0 we're done
            TOTAL_FETCHED=$(echo "$RESULTS" | jq -r '.fetched' | awk '{s+=$1} END {print s}')
            if [ "$TOTAL_FETCHED" = "0" ]; then
              echo "All feeds up to date after $COUNT calls."
              break
            fi
          done
